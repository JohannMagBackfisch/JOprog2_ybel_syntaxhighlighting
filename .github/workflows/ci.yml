name: CI

on:
    pull_request:
    workflow_dispatch:

jobs:
    build:
        name: Build
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Set up Java
              uses: actions/setup-java@v4
              with:
                  distribution: temurin
                  java-version: 21

            - name: Setup Gradle
              uses: gradle/actions/setup-gradle@v4

            - name: Compile (nur Klassen)
              run: ./gradlew classes testClasses --no-daemon

    test:
        name: Test
        runs-on: ubuntu-latest
        needs: build
        steps:
            - uses: actions/checkout@v4

            - name: Set up Java
              uses: actions/setup-java@v4
              with:
                  distribution: temurin
                  java-version: 21

            - name: Setup Gradle
              uses: gradle/actions/setup-gradle@v4

            - name: JUnit-Tests ausführen
              run: ./gradlew test --no-daemon

            - name: Test-Report hochladen
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: test-report
                  path: build/reports/tests/test/

    format:
        name: Format-Check (Spotless)
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Set up Java
              uses: actions/setup-java@v4
              with:
                  distribution: temurin
                  java-version: 21

            - name: Setup Gradle
              uses: gradle/actions/setup-gradle@v4

            - name: Spotless prüfen
              run: ./gradlew spotlessCheck --no-daemon
